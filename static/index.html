<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple^Math: Understand math. Don't just solve it</title>
  <meta name="description" content="Simple^Math: Understand math. Don't just solve it" />
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <!-- KaTeX for math rendering -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <!-- marked.js for markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <!-- Ambient Background -->
  <div class="math-bg" id="mathBg"></div>
  <div class="grid-overlay"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- Main App -->
  <div class="container">
    <div class="card">

      <!-- Header -->
      <div class="header">
        <div class="header-logo">
          <div class="logo-icon">
            <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
              <!-- Square root symbol -->
              <path d="M4 38L14 42L24 56L38 8H60" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
              <!-- x letter -->
              <path d="M46 38L58 56M58 38L46 56" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <h1>Simple^Math</h1>
        </div>
        <p>AI-powered step-by-step math solutions</p>
      </div>

      <!-- Form -->
      <form id="solveForm" autocomplete="off">

        <!-- Problem Input + Level (Horizontal Row) -->
        <div class="form-row">
          <div class="form-group">
            <label>Math Problem <span class="badge badge-optional">optional</span></label>
            <div class="input-wrapper" style="position: relative;">
              <input
                type="text"
                id="problemInput"
                placeholder="e.g. Solve 2x + 5 = 13"
              />
              <div class="compact-upload-btn mobile-only" id="compactCameraBtn" style="right: 44px;" title="Take Photo">
                <input type="file" id="compactCameraInput" accept="image/*" capture="environment" style="position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; z-index: 10; cursor: pointer;" />
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="pointer-events:none;">
                  <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                  <circle cx="12" cy="13" r="4"></circle>
                </svg>
              </div>
              <div class="compact-upload-btn" id="compactUploadBtn" title="Upload Image">
                <input type="file" id="compactFileInput" accept="image/*" style="position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; z-index: 10; cursor: pointer;" />
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="pointer-events:none;">
                  <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                  <circle cx="8.5" cy="8.5" r="1.5"></circle>
                  <polyline points="21 15 16 10 5 21"></polyline>
                </svg>
              </div>
            </div>
            <div class="compact-file-name" id="compactFileName"></div>
          </div>

          <div class="form-group">
            <label>Student Level <span class="badge badge-required">required</span></label>
            <input type="hidden" id="levelSelect" value="" />
            <div class="custom-select" id="customSelect">
              <div class="custom-select-trigger placeholder" id="selectTrigger">Select a level</div>
              <div class="custom-select-options" id="selectOptions">
                <div class="custom-select-option" data-value="Grade 9">Grade 9</div>
                <div class="custom-select-option" data-value="Grade 10">Grade 10</div>
                <div class="custom-select-option" data-value="Grade 11">Grade 11</div>
                <div class="custom-select-option" data-value="Grade 12">Grade 12</div>
                <div class="custom-select-option" data-value="Engineering">Engineering</div>
              </div>
            </div>
          </div>
        </div>

        <!-- File Upload -->
        <div class="form-group">
          <label>Upload Image <span class="badge badge-optional">optional</span></label>
          <div style="display: flex; gap: 12px;">
            <div class="file-upload-area mobile-only" id="cameraArea" style="flex: 1;">
              <input type="file" id="cameraInput" accept="image/*" capture="environment" />
              <span class="file-upload-icon">📷</span>
              <div class="file-upload-text">
                <strong>Take Photo</strong><br />
                Use camera
              </div>
            </div>
            <div class="file-upload-area" id="uploadArea" style="flex: 1;">
              <input type="file" id="fileInput" accept="image/*" />
              <span class="file-upload-icon">🖼️</span>
              <div class="file-upload-text">
                <strong>Upload Photo</strong><br />
                Files &amp; media
              </div>
            </div>
          </div>
          <div class="file-name" id="fileName"></div>
        </div>

        <!-- Solve Button -->
        <button type="submit" class="btn-solve" id="solveBtn">
          <span class="btn-content">
            <span class="spinner" id="spinner"></span>
            <span id="btnText">Solve</span>
          </span>
        </button>
      </form>

      <!-- Result -->
      <div class="result-wrapper" id="resultWrapper">
        <div class="result-label" id="resultLabel">Solution</div>
        <div class="result-box" id="resultBox"></div>
      </div>
    </div>

    <div class="footer">Powered by OpenAI &middot; Simple^Math</div>
  </div>

  <script src="/static/script.js"></script>
</body>
</html>
